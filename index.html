<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My First Website</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <p class="eyebrow">My First Website</p>
      <h1>你好，我的第一个网页仓库</h1>
      <p class="intro">
        这是一个最基础的静态网页示例。你以后可以把这里改成个人简介、作品展示、博客首页，或者任何你想做的内容。
      </p>
      <div class="actions">
        <a class="button primary" href="https://github.com/" target="_blank" rel="noreferrer">去 GitHub</a>
        <button class="button secondary" id="helloButton" type="button">点我试试看</button>
      </div>
      <p class="tip" id="message">打开这个页面，说明你的静态网页已经跑起来了。</p>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
